<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>阿嬤柑仔店｜完整版電商網站</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* ===== 原本 CSS（完全未改）===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Noto Sans TC', sans-serif;
}

body{
    background:linear-gradient(135deg,#fff7ed,#ffe0b2,#ffd6a5);
    min-height:100vh;
    color:#333;
}

/* 導覽列 */
nav{
    background:rgba(90,61,43,0.95);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    position:sticky;
    top:0;
    z-index:999;
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:#ffd166;
}

/* Hero */
.hero{
    height:500px;
    background:
    linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url('https://images.unsplash.com/photo-1506617564039-2f3b650b7010?q=80&w=1600');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

.hero h1{font-size:60px;margin-bottom:20px;}
.hero p{font-size:22px;margin-bottom:30px;}

.hero button{
    background:#ffb703;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.hero button:hover{
    transform:scale(1.08);
    background:#ffd166;
}

.container{
    width:90%;
    max-width:1300px;
    margin:auto;
    padding:60px 0;
}

.search-box{
    text-align:center;
    margin-bottom:50px;
}

.search-box input{
    width:100%;
    max-width:500px;
    padding:18px;
    border:none;
    border-radius:50px;
    font-size:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.section-title{
    text-align:center;
    margin-bottom:40px;
}

.section-title h2{
    font-size:42px;
    color:#5a3d2b;
}

.section-title p{
    margin-top:10px;
    color:#666;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.product-card{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.product-card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.product-info{padding:25px;}
.price{color:#e76f51;font-size:30px;font-weight:bold;}

.btn{
    background:#5a3d2b;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:12px;
    cursor:pointer;
}

.cart-section{
    background:white;
    margin-top:70px;
    padding:40px;
    border-radius:25px;
}

.order-section{
    margin-top:70px;
    background:white;
    padding:40px;
    border-radius:25px;
}

form{
    display:flex;
    flex-direction:column;
}

input,textarea{
    padding:16px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:12px;
}

.floating-cart{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#5a3d2b;
    color:white;
    padding:15px 20px;
    border-radius:50px;
}

#toast{
    position:fixed;
    top:30px;
    right:30px;
    background:#333;
    color:white;
    padding:15px 25px;
    border-radius:12px;
    opacity:0;
    transition:0.4s;
}

#toast.show{opacity:1;}

footer{
    background:#5a3d2b;
    color:white;
    text-align:center;
    padding:35px;
    margin-top:80px;
}

</style>
</head>

<body>

<div id="toast"></div>

<div class="floating-cart">
🛒 <span id="cartCount">0</span>
</div>

<nav>
<div class="logo">阿嬤柑仔店</div>
<ul>
<li><a href="#">首頁</a></li>
<li><a href="#">商品</a></li>
<li><a href="#">購物車</a></li>
</ul>
</nav>

<section class="hero">
<div>
<h1>古早味的幸福</h1>
<p>香蕉 × 蘇打餅</p>
<button onclick="scrollToProducts()">立即選購</button>
</div>
</section>

<div class="container">

<div class="products" id="products">

<div class="product-card">
<img src="https://image.pxgo.com.tw/pic/2025/10/13/0ebc40a0ce0e474a9f60cb4ee5c4682c.jpg">
<div class="product-info">
<h3>紫菜蘇打餅</h3>
<p class="price">20</p>
<button class="btn" onclick="addToCart('紫菜蘇打餅',20)">加入購物車</button>
</div>
</div>

<div class="product-card">
<img src="https://image.pxgo.com.tw/pic/2026/05/26/bc30fd06f02b47d897cb064291c4a230.jpg">
<div class="product-info">
<h3>香蕉</h3>
<p class="price">30</p>
<button class="btn" onclick="addToCart('香蕉',30)">加入購物車</button>
</div>
</div>

</div>

<div class="cart-section">
<h2>購物車</h2>
<div id="cartItems"></div>
<h3 id="totalPrice">0</h3>
</div>

<div class="order-section">
<h2>訂單</h2>

<form id="orderForm">
<input name="customer_name" placeholder="姓名" required>
<input name="customer_email" placeholder="Email" required>
<textarea name="message" placeholder="留言"></textarea>
<button class="btn">送出訂單</button>
</form>

</div>

</div>

<footer>© 2026 阿嬤柑仔店</footer>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

/* ===== Gmail EmailJS【已修正穩定版】===== */

// 🟢 改成官方推薦寫法（避免失敗）
emailjs.init({
    publicKey: "YOUR_PUBLIC_KEY"
});

/* ===== 購物車 ===== */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){

    let item = cart.find(i=>i.name===name);

    if(item) item.qty++;
    else cart.push({name,price,qty:1});

    save();
    render();
    showToast("加入成功");
}

function save(){
    localStorage.setItem("cart",JSON.stringify(cart));
}

function render(){

    let box = document.getElementById("cartItems");
    let total = 0;

    box.innerHTML = "";

    cart.forEach(i=>{
        total += i.price*i.qty;
        box.innerHTML += `<p>${i.name} x${i.qty}</p>`;
    });

    document.getElementById("totalPrice").innerText =
    "總金額：" + total;

    document.getElementById("cartCount").innerText =
    cart.length;
}

render();

/* ===== Toast ===== */
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
}

/* ===== 滾動 ===== */
function scrollToProducts(){
    document.getElementById("products")
    .scrollIntoView({behavior:"smooth"});
}

/* ===== Gmail 寄信（已加入穩定修正）===== */

document.getElementById("orderForm")
.addEventListener("submit", async function(event){

    event.preventDefault();

    // 🟢 新增：防空購物車
    if(cart.length === 0){
        showToast("購物車是空的");
        return;
    }

    let cartText = "";
    let total = 0;

    cart.forEach(i=>{
        cartText += `${i.name} x${i.qty}\n`;
        total += i.price*i.qty;
    });

    const templateParams = {
        customer_name: this.customer_name.value,
        customer_email: this.customer_email.value,
        message: this.message.value,
        order_details: cartText,
        total_price: total
    };

    try{

        await emailjs.send(
            "YOUR_SERVICE_ID",
            "YOUR_TEMPLATE_ID",
            templateParams
        );

        showToast("訂單已送出");

        cart = [];
        save();
        render();
        this.reset();

    }catch(error){

        console.log(error);
        showToast("寄送失敗，請檢查 EmailJS");

    }

});

</script>

</body>
</html>
