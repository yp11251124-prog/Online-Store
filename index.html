<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>阿嬤柑仔店｜完整版電商網站</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ===== 原本 CSS（完全未改）===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Noto Sans TC', sans-serif;
}

body{
    background:linear-gradient(135deg,#fff7ed,#ffe0b2,#ffd6a5);
    min-height:100vh;
    color:#333;
}

nav{
    background:rgba(90,61,43,0.95);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    position:sticky;
    top:0;
    z-index:999;
}

.logo{color:white;font-size:30px;font-weight:bold;}

nav ul{display:flex;list-style:none;gap:25px;}

nav a{color:white;text-decoration:none;}

.hero{
    height:500px;
    background:
    linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url('https://images.unsplash.com/photo-1506617564039-2f3b650b7010?q=80&w=1600');
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero h1{font-size:60px;margin-bottom:20px;}
.hero p{font-size:22px;margin-bottom:30px;}

.hero button{
    background:#ffb703;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    cursor:pointer;
}

.container{width:90%;max-width:1300px;margin:auto;padding:60px 0;}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.product-card{
    background:rgba(255,255,255,0.7);
    border-radius:25px;
    overflow:hidden;
}

.product-card img{width:100%;height:280px;object-fit:cover;}

.product-info{padding:25px;}

.price{color:#e76f51;font-size:30px;font-weight:bold;}

.btn{
    background:#5a3d2b;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:12px;
}

.floating-cart{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#5a3d2b;
    color:white;
    padding:15px 20px;
    border-radius:50px;
}

#toast{
    position:fixed;
    top:30px;
    right:30px;
    background:#333;
    color:white;
    padding:15px 25px;
    border-radius:12px;
    opacity:0;
    transition:0.4s;
}

#toast.show{opacity:1;}

.cart-section,.order-section{
    margin-top:70px;
    background:white;
    padding:40px;
    border-radius:25px;
}
</style>
</head>

<body>

<div id="toast"></div>

<div class="floating-cart">
🛒 <span id="cartCount">0</span>
</div>

<section class="hero">
<div>
<h1>古早味的幸福</h1>
<p>香蕉 × 蘇打餅</p>
<button onclick="scrollToProducts()">立即選購</button>
</div>
</section>

<div class="container">

<div class="products" id="products">

<div class="product-card">
<img src="https://image.pxgo.com.tw/pic/2025/10/13/0ebc40a0ce0e474a9f60cb4ee5c4682c.jpg">
<div class="product-info">
<h3>紫菜蘇打餅</h3>
<p class="price">20</p>
<button class="btn" onclick="addToCart('紫菜蘇打餅',20)">加入購物車</button>
</div>
</div>

<div class="product-card">
<img src="https://image.pxgo.com.tw/pic/2026/05/26/bc30fd06f02b47d897cb064291c4a230.jpg">
<div class="product-info">
<h3>香蕉</h3>
<p class="price">30</p>
<button class="btn" onclick="addToCart('香蕉',30)">加入購物車</button>
</div>
</div>

</div>

<div class="cart-section">
<h2>購物車</h2>
<div id="cartItems"></div>
<h3 id="totalPrice"></h3>
</div>

<div class="order-section">
<h2>訂單</h2>

<form id="orderForm" action="https://formsubmit.co/yp11251124@yphs.tp.edu.tw" method="POST">
<input type="hidden" name="order_details" id="order_details">
<input type="hidden" name="total_price" id="total_price">
<input type="hidden" name="_subject" value="阿嬤柑仔店新訂單">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input name="customer_name" placeholder="姓名" required>
<input name="customer_email" placeholder="Email" required>
<textarea name="message" placeholder="留言"></textarea>
<button class="btn">送出訂單</button>
</form>

</div>

</div>

<footer>© 2026 阿嬤柑仔店</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

/* ✅ 修正 1：正確初始化 */
emailjs.init("YOUR_PUBLIC_KEY");

/* ===== 購物車 ===== */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){

    let item = cart.find(i=>i.name===name);

    if(item) item.qty++;
    else cart.push({name,price,qty:1});

    save();
    render();
    showToast("加入成功");
}

function save(){
    localStorage.setItem("cart",JSON.stringify(cart));
}

function render(){

    let box = document.getElementById("cartItems");
    let total = 0;
    let qtyTotal = 0;

    box.innerHTML = "";

    cart.forEach(i=>{
        total += i.price*i.qty;
        qtyTotal += i.qty;
        box.innerHTML += `<p>${i.name} x${i.qty}</p>`;
    });

    document.getElementById("totalPrice").innerText =
    "總金額：" + total;

    document.getElementById("cartCount").innerText =
    qtyTotal;
}

render();

/* ===== Toast ===== */
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
}

/* ===== scroll ===== */
function scrollToProducts(){
    document.getElementById("products")
    .scrollIntoView({behavior:"smooth"});
}

document.getElementById("orderForm")
.addEventListener("submit", function(event){

    if(cart.length === 0){
        event.preventDefault();
        showToast("購物車是空的");
        return;
    }

    let cartText = "";
    let total = 0;

    cart.forEach(i=>{
        cartText += `${i.name} x${i.qty}\n`;
        total += i.price * i.qty;
    });

    document.getElementById("order_details").value = cartText;
    document.getElementById("total_price").value = total;

});

</script>

</body>
</html>
