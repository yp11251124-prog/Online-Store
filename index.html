<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿嬤柑仔店｜最終電商版</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#fff3e0,#ffe0b2);
}

header{
    background:#5a3d2b;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* 商品 */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:10px;
}

/* 購物車 */
.cart{
    background:white;
    margin-top:30px;
    padding:20px;
    border-radius:15px;
}

/* 按鈕 */
button{
    background:#5a3d2b;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#7a533c;
}

/* 表單 */
form{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

input,textarea{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>阿嬤柑仔店 🛒</h1>
<p>簡單可靠電商系統（EmailJS + Gmail）</p>
</header>

<div class="container">

<!-- 商品 -->
<div class="products">

    <div class="card">
        <img src="https://image.pxgo.com.tw/pic/2025/10/13/0ebc40a0ce0e474a9f60cb4ee5c4682c.jpg">
        <h3>紫菜蘇打餅</h3>
        <p>NT$ 20</p>
        <button onclick="add('紫菜蘇打餅',20)">加入購物車</button>
    </div>

    <div class="card">
        <img src="https://image.pxgo.com.tw/pic/2026/05/26/bc30fd06f02b47d897cb064291c4a230.jpg">
        <h3>香蕉（產銷履歷）</h3>
        <p>NT$ 30</p>
        <button onclick="add('香蕉',30)">加入購物車</button>
    </div>

</div>

<!-- 購物車 -->
<div class="cart">
<h2>購物車</h2>
<div id="cartList"></div>
<h3 id="total">總金額：0</h3>
</div>

<!-- 訂單 -->
<form id="orderForm">
<h2>訂單表單</h2>

<input name="name" placeholder="姓名" required>
<input name="email" placeholder="Email" required>
<textarea name="msg" placeholder="備註"></textarea>

<button type="submit">送出訂單</button>
</form>

</div>

<script>

// 初始化 EmailJS
emailjs.init("YOUR_PUBLIC_KEY");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// 加入購物車
function add(name, price){

    let item = cart.find(i => i.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    save();
    render();
}

// 儲存
function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

// 渲染
function render(){

    let list = document.getElementById("cartList");
    let total = 0;

    list.innerHTML = "";

    cart.forEach((i,index)=>{

        total += i.price * i.qty;

        list.innerHTML += `
        <p>
        ${i.name} x ${i.qty}
        <button onclick="del(${index})">刪除</button>
        </p>`;
    });

    document.getElementById("total").innerText =
    "總金額：" + total;
}

// 刪除
function del(i){
    cart.splice(i,1);
    save();
    render();
}

// 訂單送出
document.getElementById("orderForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    if(cart.length === 0){
        alert("購物車是空的");
        return;
    }

    let orderText = "";
    let total = 0;

    cart.forEach(i=>{
        orderText += `${i.name} x${i.qty}\n`;
        total += i.price * i.qty;
    });

    let data = {
        name:this.name.value,
        email:this.email.value,
        msg:this.msg.value,
        order:orderText,
        total:total
    };

    try{

        await emailjs.send(
            "YOUR_SERVICE_ID",
            "YOUR_TEMPLATE_ID",
            data
        );

        alert("訂單已成功寄出");

        cart = [];
        save();
        render();
        this.reset();

    }catch(err){
        console.log(err);
        alert("寄送失敗，請檢查 EmailJS 設定");
    }

});

// 初始化
render();

</script>

</body>
</html>
